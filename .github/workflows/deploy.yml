name: Refresh State Data + Deploy to GitHub Pages

on:
  # Run automatically every Monday at 2am UTC
  schedule:
    - cron: "0 2 * * 1"
  # Allow manual trigger from GitHub Actions tab
  workflow_dispatch:
  # Also run on every push to main (so the page deploys immediately)
  push:
    branches: [main]

permissions:
  contents: write       # needed to commit states.json back to repo
  pages: write          # needed to deploy to GitHub Pages
  id-token: write       # needed for OIDC Pages deployment

jobs:
  # ── Job 1: Fetch live data and update states.json ──────────────
  refresh-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install httpx python-dotenv

      - name: Generate states.json
        env:
          CENSUS_API_KEY: ${{ secrets.CENSUS_API_KEY }}
          FBI_API_KEY: ${{ secrets.FBI_API_KEY }}
        run: python generate_data.py

      - name: Commit updated data file
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add static/data/states.json
          # Only commit if the file actually changed
          git diff --staged --quiet || git commit -m "chore: refresh state data [skip ci]"
          git push

  # ── Job 2: Deploy static site to GitHub Pages ──────────────────
  deploy-pages:
    needs: refresh-data
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main     # pull the latest (which has the freshly committed states.json)

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload static directory as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./static

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
